<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chicken Scream</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
    user-select: none;
  }

  #gameWrapper {
    position: relative;
    width: 480px;
    max-width: 100vw;
  }

  #ui {
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: #fff;
    padding: 8px 4px;
    font-size: 18px;
    font-weight: bold;
  }

  #score { color: #ffd700; font-size: 24px; }
  #highScore { color: #aaa; font-size: 14px; }

  #micStatus {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: #aaa;
  }

  #micDot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #555;
    transition: background 0.1s;
  }

  #micDot.active { background: #ff4444; box-shadow: 0 0 8px #ff4444; }
  #micDot.loud   { background: #ff9900; box-shadow: 0 0 12px #ff9900; }

  canvas {
    display: block;
    border-radius: 16px;
    border: 2px solid #333;
    cursor: pointer;
  }

  #overlay {
    position: absolute;
    top: 45px;
    left: 0; right: 0;
    bottom: 0;
    border-radius: 16px;
    background: rgba(0,0,0,0.75);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    gap: 16px;
    backdrop-filter: blur(4px);
  }

  #overlay h1 { font-size: 48px; }
  #overlay p  { font-size: 16px; color: #ccc; text-align: center; max-width: 320px; line-height: 1.6; }

  #startBtn {
    background: linear-gradient(135deg, #ff6b35, #ff9500);
    border: none;
    color: #fff;
    font-size: 20px;
    font-weight: bold;
    padding: 14px 40px;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(255,107,53,0.5);
    transition: transform 0.1s, box-shadow 0.1s;
  }

  #startBtn:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 28px rgba(255,107,53,0.7);
  }

  #deathMsg { font-size: 28px; color: #ff6b35; display: none; }

  #volumeMeter {
    width: 120px; height: 10px;
    background: #333;
    border-radius: 5px;
    overflow: hidden;
  }
  #volumeBar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #4caf50, #ff9900, #ff4444);
    transition: width 0.05s;
    border-radius: 5px;
  }
</style>
</head>
<body>

<div id="gameWrapper">
  <div id="ui">
    <div id="score">0</div>
    <div id="micStatus">
      <div id="micDot"></div>
      <span id="micLabel">No mic</span>
      <div id="volumeMeter"><div id="volumeBar"></div></div>
    </div>
    <div id="highScore">Best: 0</div>
  </div>

  <canvas id="canvas" width="480" height="520"></canvas>

  <div id="overlay">
    <div id="deathMsg">💀 BAWK!</div>
    <h1>🐔</h1>
    <p id="overlayText">Scream or click to make the chicken fly!<br>Allow microphone for full scream experience.</p>
    <button id="startBtn">Play</button>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ── State ──────────────────────────────────────────────────────────────
let score = 0, highScore = 0, frame = 0, gameRunning = false;
let micVolume = 0, micPermission = false;
let audioCtx, analyser, dataArray, micStream;

// ── Chicken ────────────────────────────────────────────────────────────
const chicken = {
  x: 80, y: H / 2, vy: 0,
  width: 52, height: 44,
  flapAngle: 0, flapDir: 1,
  squishY: 1, squishX: 1,
  trail: [],

  reset() {
    this.y = H / 2; this.vy = 0;
    this.trail = [];
    this.squishY = 1; this.squishX = 1;
  },

  flap(power = 1) {
    this.vy = -9 * power;
    this.squishY = 0.6; this.squishX = 1.3;
  },

  update() {
    this.vy += 0.45;
    this.y  += this.vy;
    this.flapAngle += 0.25 * this.flapDir;
    if (Math.abs(this.flapAngle) > 0.6) this.flapDir *= -1;

    this.squishY += (1 - this.squishY) * 0.2;
    this.squishX += (1 - this.squishX) * 0.2;

    this.trail.unshift({ x: this.x, y: this.y, alpha: 1 });
    if (this.trail.length > 8) this.trail.pop();
    this.trail.forEach(t => t.alpha -= 0.12);

    if (this.y < 0)      { this.y = 0;      this.vy = 2; }
    if (this.y + this.height > H) return true; // dead
    return false;
  },

  hitbox() {
    return {
      x: this.x + 6,
      y: this.y + 6 * this.squishY,
      w: this.width  - 12,
      h: this.height * this.squishY - 12
    };
  }
};

// ── Obstacles ──────────────────────────────────────────────────────────
let pipes = [];
const PIPE_W = 58, GAP = 155, PIPE_SPEED = 3;

function spawnPipe() {
  const minTop = 60, maxTop = H - GAP - 60;
  const topH = Math.random() * (maxTop - minTop) + minTop;
  pipes.push({ x: W + 10, topH, scored: false });
}

function drawPipe(p) {
  const r = 8;
  // Top pipe
  const tG = ctx.createLinearGradient(p.x, 0, p.x + PIPE_W, 0);
  tG.addColorStop(0, '#3a7d44'); tG.addColorStop(0.4, '#52a852'); tG.addColorStop(1, '#2d5e35');
  ctx.fillStyle = tG;
  roundRect(p.x, 0, PIPE_W, p.topH - 10, r);
  // Top cap
  ctx.fillStyle = '#4a9e57';
  roundRect(p.x - 6, p.topH - 26, PIPE_W + 12, 22, r);

  // Bottom pipe
  const bY = p.topH + GAP;
  const bG = ctx.createLinearGradient(p.x, 0, p.x + PIPE_W, 0);
  bG.addColorStop(0, '#3a7d44'); bG.addColorStop(0.4, '#52a852'); bG.addColorStop(1, '#2d5e35');
  ctx.fillStyle = bG;
  roundRect(p.x, bY + 10, PIPE_W, H - bY - 10, r);
  // Bottom cap
  ctx.fillStyle = '#4a9e57';
  roundRect(p.x - 6, bY, PIPE_W + 12, 22, r);
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  ctx.fill();
}

// ── Background ─────────────────────────────────────────────────────────
let bgX = 0;
const clouds = Array.from({ length: 5 }, () => ({
  x: Math.random() * W, y: Math.random() * 160 + 20,
  w: Math.random() * 80 + 40, speed: Math.random() * 0.4 + 0.2
}));

function drawBg() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#87ceeb'); grad.addColorStop(0.6, '#b0e0ff'); grad.addColorStop(1, '#c8f0a0');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Clouds
  clouds.forEach(c => {
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.beginPath();
    ctx.ellipse(c.x, c.y, c.w, c.w * 0.4, 0, 0, Math.PI * 2);
    ctx.ellipse(c.x + c.w * 0.4, c.y - c.w * 0.15, c.w * 0.55, c.w * 0.35, 0, 0, Math.PI * 2);
    ctx.ellipse(c.x - c.w * 0.35, c.y - c.w * 0.1, c.w * 0.45, c.w * 0.28, 0, 0, Math.PI * 2);
    ctx.fill();
    if (gameRunning) {
      c.x -= c.speed;
      if (c.x + c.w < 0) { c.x = W + c.w; c.y = Math.random() * 160 + 20; }
    }
  });

  // Ground
  ctx.fillStyle = '#7ec850';
  ctx.fillRect(0, H - 30, W, 30);
  ctx.fillStyle = '#5da832';
  ctx.fillRect(0, H - 30, W, 8);
}

// ── Draw Chicken ───────────────────────────────────────────────────────
function drawChicken() {
  // Trail
  chicken.trail.forEach((t, i) => {
    ctx.save();
    ctx.globalAlpha = Math.max(0, t.alpha * 0.3);
    ctx.fillStyle = '#ffd700';
    ctx.beginPath();
    ctx.ellipse(t.x + 20, t.y + 22, 16 - i, (12 - i) * chicken.squishY, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });

  const cx = chicken.x, cy = chicken.y;
  const sy = chicken.squishY, sx = chicken.squishX;

  ctx.save();
  ctx.translate(cx + chicken.width / 2, cy + chicken.height / 2);
  ctx.scale(sx, sy);
  ctx.translate(-chicken.width / 2, -chicken.height / 2);

  // Tilt based on velocity
  ctx.translate(chicken.width / 2, chicken.height / 2);
  ctx.rotate(Math.min(Math.max(chicken.vy * 0.04, -0.4), 0.6));
  ctx.translate(-chicken.width / 2, -chicken.height / 2);

  // Wing (back)
  ctx.save();
  ctx.translate(10, 18);
  ctx.rotate(chicken.flapAngle * 0.8);
  ctx.fillStyle = '#e8a000';
  ctx.beginPath();
  ctx.ellipse(0, 0, 18, 10, -0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Body
  ctx.fillStyle = '#f5c842';
  ctx.beginPath();
  ctx.ellipse(26, 24, 22, 18, 0, 0, Math.PI * 2);
  ctx.fill();

  // Head
  ctx.fillStyle = '#f5c842';
  ctx.beginPath();
  ctx.ellipse(44, 14, 13, 12, 0, 0, Math.PI * 2);
  ctx.fill();

  // Comb
  ctx.fillStyle = '#ff3333';
  ctx.beginPath();
  ctx.moveTo(38, 5); ctx.bezierCurveTo(40, -4, 44, -2, 46, 5);
  ctx.bezierCurveTo(46, -5, 50, -3, 52, 5);
  ctx.lineTo(38, 5);
  ctx.fill();

  // Wattle
  ctx.fillStyle = '#ff3333';
  ctx.beginPath();
  ctx.ellipse(42, 20, 4, 6, 0.3, 0, Math.PI * 2);
  ctx.fill();

  // Beak
  ctx.fillStyle = '#ff9900';
  ctx.beginPath();
  ctx.moveTo(55, 13); ctx.lineTo(62, 15); ctx.lineTo(55, 18);
  ctx.closePath(); ctx.fill();

  // Eye
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(48, 11, 4, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.arc(49, 11, 2.2, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(50, 10, 1, 0, Math.PI * 2); ctx.fill();

  // Feet
  ctx.strokeStyle = '#cc7700'; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(18, 40); ctx.lineTo(10, 52);
  ctx.moveTo(10, 52); ctx.lineTo(4, 52);
  ctx.moveTo(10, 52); ctx.lineTo(10, 57);
  ctx.moveTo(10, 52); ctx.lineTo(16, 52);
  ctx.stroke();
  ctx.beginPath(); ctx.moveTo(28, 40); ctx.lineTo(22, 52);
  ctx.moveTo(22, 52); ctx.lineTo(16, 52);
  ctx.moveTo(22, 52); ctx.lineTo(22, 57);
  ctx.moveTo(22, 52); ctx.lineTo(28, 52);
  ctx.stroke();

  // Wing (front)
  ctx.save();
  ctx.translate(30, 16);
  ctx.rotate(-chicken.flapAngle * 0.6);
  ctx.fillStyle = '#f0b800';
  ctx.beginPath();
  ctx.ellipse(0, 0, 16, 9, 0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  ctx.restore();
}

// ── Particles ──────────────────────────────────────────────────────────
let particles = [];
function spawnFeathers(x, y) {
  for (let i = 0; i < 12; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 5 + 2;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      life: 1, size: Math.random() * 10 + 5,
      color: ['#f5c842','#e8a000','#fff','#ff9900'][Math.floor(Math.random()*4)]
    });
  }
}

function updateParticles() {
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.2;
    p.life -= 0.025;
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.translate(p.x, p.y);
    ctx.rotate(p.vx * 0.2);
    ctx.beginPath();
    ctx.ellipse(0, 0, p.size * 0.4, p.size, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
  particles = particles.filter(p => p.life > 0);
}

// ── Score display ──────────────────────────────────────────────────────
const scoreEl    = document.getElementById('score');
const highScoreEl = document.getElementById('highScore');
const micDot     = document.getElementById('micDot');
const micLabel   = document.getElementById('micLabel');
const volumeBar  = document.getElementById('volumeBar');
const overlay    = document.getElementById('overlay');
const startBtn   = document.getElementById('startBtn');
const deathMsg   = document.getElementById('deathMsg');
const overlayText = document.getElementById('overlayText');

// ── Mic ────────────────────────────────────────────────────────────────
async function initMic() {
  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioCtx  = new (window.AudioContext || window.webkitAudioContext)();
    analyser  = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    dataArray = new Uint8Array(analyser.frequencyBinCount);
    audioCtx.createMediaStreamSource(micStream).connect(analyser);
    micPermission = true;
    micLabel.textContent = 'Mic on';
    micDot.style.background = '#4caf50';
  } catch(e) {
    micLabel.textContent = 'Click to fly';
  }
}

function getMicVolume() {
  if (!analyser) return 0;
  analyser.getByteFrequencyData(dataArray);
  const avg = dataArray.reduce((a,b) => a + b, 0) / dataArray.length;
  return avg / 128;
}

// ── Collision ──────────────────────────────────────────────────────────
function checkCollision(p) {
  const h = chicken.hitbox();
  const pRight = p.x + PIPE_W, bY = p.topH + GAP;
  return (
    h.x + h.w > p.x && h.x < pRight &&
    (h.y < p.topH || h.y + h.h > bY)
  );
}

// ── Game loop ──────────────────────────────────────────────────────────
let animId;
function gameLoop() {
  animId = requestAnimationFrame(gameLoop);
  frame++;

  // Mic
  micVolume = getMicVolume();
  const pct = Math.min(micVolume * 200, 100);
  volumeBar.style.width = pct + '%';

  if (micVolume > 0.15) {
    micDot.className = micVolume > 0.4 ? 'loud' : 'active';
  } else {
    micDot.className = micPermission ? '' : '';
  }

  // Auto-flap from mic
  if (micVolume > 0.15 && gameRunning) {
    const power = Math.min(micVolume * 2.5, 1.8);
    chicken.flap(power);
  }

  drawBg();

  if (gameRunning) {
    // Spawn pipes
    if (frame % 90 === 0) spawnPipe();

    // Move/draw pipes
    pipes.forEach(p => {
      p.x -= PIPE_SPEED + score * 0.02;
      drawPipe(p);

      if (!p.scored && p.x + PIPE_W < chicken.x) {
        p.scored = true;
        score++;
        scoreEl.textContent = score;
        if (score > highScore) { highScore = score; highScoreEl.textContent = 'Best: ' + highScore; }
      }

      if (checkCollision(p)) endGame();
    });
    pipes = pipes.filter(p => p.x + PIPE_W > 0);

    const dead = chicken.update();
    if (dead) endGame();
  }

  drawChicken();
  updateParticles();
}

function startGame() {
  score = 0; frame = 0;
  scoreEl.textContent = '0';
  pipes = [];
  particles = [];
  chicken.reset();
  gameRunning = true;
  overlay.style.display = 'none';
  if (!animId) gameLoop();
}

function endGame() {
  gameRunning = false;
  spawnFeathers(chicken.x + 30, chicken.y + 22);
  deathMsg.style.display = 'block';
  overlayText.innerHTML = `You scored <strong style="color:#ffd700">${score}</strong>!<br>Scream or click to flap!`;
  startBtn.textContent = 'Play Again';
  overlay.style.display = 'flex';
}

// ── Input ──────────────────────────────────────────────────────────────
function handleFlap() {
  if (gameRunning) chicken.flap();
}

canvas.addEventListener('click', handleFlap);
canvas.addEventListener('touchstart', e => { e.preventDefault(); handleFlap(); }, { passive: false });
document.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); handleFlap(); } });

startBtn.addEventListener('click', async () => {
  if (!micPermission) await initMic();
  startGame();
});

// ── Boot ───────────────────────────────────────────────────────────────
initMic();
gameLoop();
</script>
</body>
</html>
